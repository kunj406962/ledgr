# ci.yml — Pull Request Gate
#
# This workflow runs on every pull request targeting main.
# Its job is to be a quality gate: if anything here fails,
# the PR cannot be merged. It enforces consistent code quality
# across linting, type checking, formatting, and tests.

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    # Run on the latest Ubuntu — matches our Docker and Render environment.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


    steps:
      # Step 1: Check out the code from the PR branch.
      # Without this, the runner has no code to work with.
      - name: Checkout code
        uses: actions/checkout@v4

      # ── FRONTEND ──────────────────────────────────────────

      # Step 2: Install Node 20 and tell GitHub Actions to cache
      # node_modules between runs using package-lock.json as the cache key.
      # If package-lock.json hasn't changed, npm ci is near-instant.
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Step 3: Install frontend dependencies exactly as specified
      # in package-lock.json. `npm ci` is stricter than `npm install`
      # — it fails if the lockfile is out of sync, which is what you want in CI.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Step 4: Run ESLint on all TypeScript and JSX files.
      # This catches code style issues, unused imports, and common mistakes.
      # Fails the job if any error is found (warnings are allowed).
      - name: ESLint
        working-directory: frontend
        run: npm run lint

      # Step 5: Run the TypeScript compiler in check-only mode.
      # --noEmit means it checks types but doesn't output any files.
      # This catches type errors that ESLint doesn't catch.
      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      # Step 6: Run Jest unit and integration tests.
      # --watchAll=false ensures Jest exits after one run (it normally
      # stays open in watch mode, which would hang the CI runner forever).
      - name: Jest tests
        working-directory: frontend
        run: npm test -- --watchAll=false

      # ── BACKEND ──────────────────────────────────────────

      # Step 7: Install Python 3.12 and cache pip downloads
      # using requirements.txt as the cache key.
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # Step 8: Install all Python dependencies from requirements.txt.
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      # Step 9: Black is Python's opinionated code formatter.
      # --check mode doesn't modify files — it just exits with an error
      # if any file would be reformatted. Keeps code style consistent
      # without anyone having to argue about formatting in code review.
      - name: Black format check
        run: black --check backend/

      # Step 10: Run all pytest tests in the backend/tests/ directory.
      # -v means verbose — shows each test name as it runs.
      # DATABASE_URL is passed in so tests that need a DB connection have it.
      - name: pytest
        run: pytest backend/tests/ -v
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }} 