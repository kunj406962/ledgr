# deploy.yml — Production Deploy Pipeline
#
# This workflow runs only when code is merged (pushed) to main.
# It re-runs tests on the final merged code, builds Docker images,
# pushes them to Docker Hub, and triggers a redeploy on Render.
#
# Vercel handles the frontend deploy automatically via its own
# GitHub integration — no step needed here for that.

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── TESTS (run again on merged code) ──────────────────
      # We always re-run tests on the final merged commit.
      # The CI workflow ran on the PR branch, but the merge might
      # have introduced issues. Never deploy without confirming.

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests/ -v
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # ── DOCKER BUILD & PUSH ────────────────────────────────

      # Log in to Docker Hub using credentials stored in GitHub Secrets.
      # Never hardcode credentials — always use secrets.
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the FastAPI Docker image and tag it two ways:
      # :latest — always points to the most recent build (used by Render)
      # :[git-sha] — immutable tag for this exact commit (used for rollbacks)
      # If a bad deploy happens, you can tell Render to pull a specific SHA tag.
      - name: Build and push API image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/finplan-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/finplan-api:${{ github.sha }} \
            -f Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/finplan-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/finplan-api:${{ github.sha }}

      # ── RENDER DEPLOY ──────────────────────────────────────

      # Send an HTTP POST to the Render deploy webhook URL.
      # Render picks up the new :latest image and redeploys automatically.
      # The webhook URL is stored as a secret — it acts like an API key.
      - name: Trigger Render redeploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      # ── NOTIFICATIONS ──────────────────────────────────────

      # This step only runs if something above failed.
      # GitHub also sends email notifications automatically for failed
      # workflow runs to the repo owner — this is an extra log message.
      - name: Log failure
        if: failure()
        run: |
          echo "Deploy failed on commit ${{ github.sha }}"
          echo "Check the steps above for the error"