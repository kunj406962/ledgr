# ml-weekly.yml — Automated Weekly ML Pipeline
#
# This workflow runs every Monday at 2:00 AM UTC (Sunday ~7-8 PM Calgary time).
# It is completely separate from CI/CD — it doesn't build or deploy anything.
# Its only job is to run the ML pipeline scripts, which:
#   1. Pull 90 days of transaction data from Supabase
#   2. Train models and generate predictions per user/category
#   3. Write predictions and anomalies back to Supabase
#
# This is the "batch inference" architecture: predictions are pre-computed
# on a schedule so the app can serve them instantly at request time.
# No ML model runs during a user's API request — only reads from the predictions table.
#
# workflow_dispatch means you can also trigger this manually from the
# GitHub Actions UI — useful for testing the pipeline before Monday.

name: ML Weekly Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"   # Minute 0, Hour 2, Any day-of-month, Any month, Monday (1)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest ML pipeline code
        uses: actions/checkout@v4

      # Install Python with caching keyed on ml-service/requirements.txt.
      # If the ML dependencies haven't changed, pip install is skipped.
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      # Install the ML-specific dependencies (pandas, scikit-learn, prophet, etc.)
      # These are kept in a separate requirements.txt from the backend
      # because they're heavy (especially prophet) and only needed here.
      - name: Install ML dependencies
        run: pip install -r ml-service/requirements.txt

      # Run the main pipeline script.
      # This script orchestrates all the sub-scripts:
      # pull_data → preprocess → category_forecast → cashflow_forecast
      # → anomaly_detect → write_results
      # DATABASE_URL gives it direct access to Supabase PostgreSQL.
      - name: Run weekly ML pipeline
        run: python ml-service/scripts/weekly_pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Always print a completion message, even if the pipeline failed.
      # The actual output and any errors are visible in the step logs above.
      - name: Pipeline summary
        if: always()
        run: |
          echo "Pipeline run complete for commit ${{ github.sha }}"
          echo "If this step is green but the pipeline step is red, check the Python output above"

      # GitHub automatically emails the repo owner when a scheduled workflow fails.
      # No extra notification setup needed for basic failure alerting.